  pt:
  
    cover_purpose_dommmx: |
      Este relatório constitui a aplicação operacional do DOMMx por meio de um assessment estruturado por domínio.

      Para cada domínio avaliado, o documento apresenta o nível atual de maturidade e define o conjunto estruturado de ações necessárias para evoluir ao próximo nível.

      O conteúdo é prescritivo e orientado à construção e fortalecimento de artefatos de governança de dados, devendo ser utilizado como base técnica para documentar, institucionalizar e aprimorar práticas de governança de forma proporcional ao nível identificado.

    how_to_use_report: |
      Este relatório deve ser utilizado como guia técnico para a evolução estruturada da governança de dados por domínio.

      Com base no nível de maturidade identificado no assessment, o DOMMx aciona pacotes prescritivos que definem o que deve ser construído, formalizado ou fortalecido para viabilizar a progressão ao próximo estágio.

      A aplicação prática deste relatório envolve:

      1. Construir artefatos formais quando inexistentes ou insuficientes
      2. Padronizar e documentar práticas quando parcialmente estruturadas
      3. Integrar e institucionalizar mecanismos quando já definidos
      4. Preparar o domínio para gestão mensurável nos ciclos subsequentes

      Cada seção por domínio deve ser convertida em documentação formal adaptada ao contexto organizacional específico, mantendo a estrutura proposta e contextualizando o conteúdo técnico conforme a realidade do domínio avaliado.

      Este relatório não é meramente descritivo. Seu propósito é orientar ação estruturada e progressão de maturidade.  
  
    likert:
      0: Inicial
      1: Ad-hoc
      2: Emergente
      3: Definido
      4: Gerenciado
      5: Otimizado
