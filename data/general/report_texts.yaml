report_text:
  us:
  
    cover_purpose_dommmx: |
      This report represents the operational application of DOMMx through a structured domain-based assessment.

      For each evaluated domain, the report presents the current maturity level and defines the structured set of actions required to evolve to the next level.

      The content is prescriptive and focused on the construction and strengthening of data governance artifacts, and should be used as a technical foundation to document, institutionalize, and enhance governance practices proportionally to the identified maturity level.

    how_to_use_report: |
      This report should be used as a technical guide for the structured evolution of data governance by domain.

      Based on the maturity level identified in the assessment, DOMMx activates prescriptive action packages that define what must be built, formalized, or strengthened to enable progression to the next maturity stage.

      The practical application of this report involves:

      1. Building formal governance artifacts when they do not exist or are insufficient
      2. Standardizing and documenting practices when partially structured
      3. Integrating and institutionalizing mechanisms when already defined
      4. Preparing the domain for measurable management in subsequent cycles

      Each domain section should be converted into formal documentation adapted to the specific organizational context, maintaining the proposed structure while contextualizing the technical content to the evaluated domain.

      This report is not merely descriptive. Its purpose is to drive structured action and maturity progression.
    
    likert:
      0: Initial
      1: Ad-hoc
      2: Emerging
      3: Defined
      4: Managed
      5: Optimized
