  de:
  
    cover_purpose_dommmx: |
      Dieser Bericht stellt die operative Anwendung des DOMMx durch eine strukturierte domänenbasierte Bewertung dar.

      Für jede bewertete Domäne beschreibt das Dokument den aktuellen Reifegrad und definiert die strukturierte Menge an Maßnahmen, die erforderlich sind, um den nächsten Reifegrad zu erreichen.

      Der Inhalt ist präskriptiv und auf die Erstellung und Stärkung von Data-Governance-Artefakten ausgerichtet. Er dient als technische Grundlage zur Dokumentation, Institutionalisierung und Weiterentwicklung von Governance-Praktiken entsprechend dem identifizierten Reifegrad.

    how_to_use_report: |
      Dieser Bericht dient als technischer Leitfaden für die strukturierte Weiterentwicklung der Data Governance nach Domänen.

      Basierend auf dem im Assessment identifizierten Reifegrad aktiviert DOMMx präskriptive Maßnahmenpakete, die definieren, was aufgebaut, formalisiert oder gestärkt werden muss, um den nächsten Reifegrad zu erreichen.

      Die praktische Anwendung dieses Berichts umfasst:

      1. Formale Governance-Artefakte aufzubauen, wenn sie fehlen oder unzureichend sind
      2. Praktiken zu standardisieren und zu dokumentieren, wenn sie teilweise strukturiert sind
      3. Mechanismen zu integrieren und zu institutionalisieren, wenn sie bereits definiert sind
      4. Die Domäne auf eine messbare Steuerung in nachfolgenden Zyklen vorzubereiten

      Jeder Domänenabschnitt sollte in eine formale Dokumentation überführt werden, die an den spezifischen organisatorischen Kontext angepasst ist, wobei die vorgeschlagene Struktur beibehalten und der technische Inhalt entsprechend der bewerteten Domäne kontextualisiert wird.

      Dieser Bericht ist nicht lediglich beschreibend. Sein Zweck besteht darin, strukturierte Maßnahmen und Reifegradentwicklung zu fördern.
  
    likert:
      0: Initial
      1: Ad-hoc
      2: Aufstrebend
      3: Definiert
      4: Gesteuert
      5: Optimiert
