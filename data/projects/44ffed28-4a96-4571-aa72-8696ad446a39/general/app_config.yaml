app:
  title: "🛡️ DOMMx Diagnostic Evaluation"
  show_intro: true
  language_default: us
  language_posible: [us,es,pt,fr,it,de]

intro:
  heading: "Welcome to DOMMx Assessment"
  message: >            
    Welcome to the DOMMx Assessment
    
    This assessment is part of the evaluation process of DOMMx – Data Operating Model & Maturity, with the objective of analyzing the model’s 
    ability to function as both an evaluative and prescriptive instrument for data governance. 
    Through a structured set of questions, the assessment seeks to understand how data governance and data management practices are currently 
    organized and executed within the organization. Based on the responses, the model interprets maturity signals and links these results to 
    governance capabilities, expected deliverables, and potential improvement actions.
    The exercise therefore has a dual purpose: to understand the current state of data governance and to evaluate whether DOMMx can consistently
    translate diagnostic results into structured and actionable guidance.
    Although the system is designed to be intuitive and includes mechanisms that help prevent inconsistencies, it is essential to read the user 
    manual and the assessment completion guide before starting, as well as consult the supporting materials provided. Whenever possible, download these
    materials and use them as a reference during the assessment.
    Responses should reflect the current reality of the organization, rather than the desired or planned state. There are no right or wrong answers. 
    The purpose is not to audit the organization, but to evaluate the DOMMx model itself and its ability to support diagnosis and decision-making in data
    governance.
    
    Your participation is essential for this evaluation. Thank you for your collaboration.

