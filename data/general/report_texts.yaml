  es:
  
    cover_purpose_dommmx: |
      Este informe constituye la aplicación operativa de DOMMx mediante una evaluación estructurada por dominio.

      Para cada dominio evaluado, el documento presenta el nivel actual de madurez y define el conjunto estructurado de acciones necesarias para evolucionar al siguiente nivel.

      El contenido es prescriptivo y está orientado a la construcción y fortalecimiento de artefactos de gobernanza de datos, debiendo utilizarse como base técnica para documentar, institucionalizar y mejorar prácticas de gobernanza de forma proporcional al nivel identificado.

    how_to_use_report: |
      Este informe debe utilizarse como guía técnica para la evolución estructurada de la gobernanza de datos por dominio.

      Con base en el nivel de madurez identificado en la evaluación, DOMMx activa paquetes prescriptivos que definen qué debe construirse, formalizarse o fortalecerse para permitir la progresión al siguiente nivel.

      La aplicación práctica de este informe implica:

      1. Construir artefactos formales cuando no existan o sean insuficientes
      2. Estandarizar y documentar prácticas cuando estén parcialmente estructuradas
      3. Integrar e institucionalizar mecanismos cuando ya estén definidos
      4. Preparar el dominio para una gestión medible en ciclos posteriores

      Cada sección por dominio debe convertirse en documentación formal adaptada al contexto organizacional específico, manteniendo la estructura propuesta y contextualizando el contenido técnico según la realidad del dominio evaluado.

      Este informe no es meramente descriptivo. Su propósito es impulsar acción estructurada y progresión de madurez.  
  
